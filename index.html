<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플러쉬 FLUSH 공식몰 — 립 &amp; 치크 컬러 브랜드</title>
  <meta name="description" content="입술과 볼에 가볍게 번지는 생기, FLUSH 공식 온라인몰. 신규가입 3,000원 쿠폰 · 3만원 이상 무료배송">
  <link rel="icon" href="assets/flush_icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=47">
</head>
<body class="home">

  <div id="chrome-header"></div>

  <!-- 프로모션 팝업 (오늘 하루 보지 않기) -->
  <div class="ad-modal" id="ad-modal" hidden>
    <div class="ad-dim" id="ad-dim"></div>
    <div class="ad-box">
      <a href="index.html#event" class="ad-img" id="ad-link">
        <img src="assets/ads.jpg" alt="FLUSH × 올리브영 한정 기획 세트 — Bunny Drop Edition">
      </a>
      <div class="ad-foot">
        <button type="button" id="ad-today">오늘 하루 보지 않기</button>
        <button type="button" class="ad-close" id="ad-close">닫기 ✕</button>
      </div>
    </div>
  </div>

  <main>
    <!-- 히어로 슬라이드 배너 — 이미지 3장 -->
    <section class="main-banner" id="event">
      <div class="banner-track" id="banner-track">
        <div class="banner-slide s1">
          <div class="container">
            <div class="banner-copy">
              <h2 data-i18n="bn1.title"></h2>
              <a href="product.html?id=powder-blush" class="btn btn-primary" data-i18n="bn1.cta"></a>
            </div>
          </div>
        </div>
        <div class="banner-slide s2">
          <div class="container">
            <div class="banner-copy">
              <h2 data-i18n="hero2.title"></h2>
              <a href="product.html?id=lip-liner" class="btn btn-primary" data-i18n="hero2.cta"></a>
            </div>
          </div>
        </div>
        <div class="banner-slide s3">
          <div class="container">
            <div class="banner-copy">
              <h2 data-i18n="hero3.title"></h2>
              <a href="product.html?id=lip-tint" class="btn btn-primary" data-i18n="hero3.cta"></a>
            </div>
          </div>
        </div>
      </div>
      <div class="banner-nav" id="banner-nav"></div>
    </section>

    <!-- 카테고리 퀵메뉴 -->
    <section class="section">
      <div class="container">
        <div class="quick-cats">
          <a class="quick-cat" href="shop.html?category=lip-tint">
            <span class="qc-circle"><img src="assets/products/lip tint 03 pop.png" alt="립 틴트" loading="lazy"></span>
            <span data-i18n="qc.tint"></span>
          </a>
          <a class="quick-cat" href="shop.html?category=lip-balm">
            <span class="qc-circle"><img src="assets/products/lip balm 01 peach dew.png" alt="립밤" loading="lazy"></span>
            <span data-i18n="qc.balm"></span>
          </a>
          <a class="quick-cat" href="shop.html?category=powder-blush">
            <span class="qc-circle"><img src="assets/products/powder blush 04 golden hour.png" alt="파우더 블러쉬" loading="lazy"></span>
            <span data-i18n="qc.powder"></span>
          </a>
          <a class="quick-cat" href="shop.html?category=cream-blush">
            <span class="qc-circle"><img src="assets/products/cream blush 01 vintage rose.png" alt="크림 블러쉬" loading="lazy"></span>
            <span data-i18n="qc.cream"></span>
          </a>
          <a class="quick-cat" href="shop.html?category=lip-liner">
            <span class="qc-circle"><img src="assets/products/lip liner 01 petal pink.png" alt="립라이너" loading="lazy"></span>
            <span data-i18n="qc.liner"></span>
          </a>
        </div>
      </div>
    </section>

    <!-- NEW / BEST 통합 섹션 : 좌측 비주얼 + 우측 2x2 그리드 -->
    <section class="section">
      <div class="container bestnew-layout">
        <div class="bestnew-visual">
          <img id="bestnew-visual-img" src="assets/model best.jpg" alt="FLUSH 모델 컷" loading="lazy">
          <span class="drag-cue" aria-hidden="true">DRAG</span>
        </div>
        <div class="bestnew-right">
          <div class="sec-tabs">
            <button class="sec-tab" data-sec-tab="new">NEW</button>
            <span class="sec-tab-div"></span>
            <button class="sec-tab active" data-sec-tab="best">BEST</button>
          </div>
          <div class="product-grid" id="bestnew-grid"></div>
        </div>
      </div>
    </section>

    <!-- Choose your Flush — 자동 스크롤 쉐이드 마퀴 (호버 시 정지 + 쉐이드 배경색) -->
    <section class="flush-picker" id="flush-picker">
      <h2 class="fp-title">CHOOSE YOUR FLUSH</h2>
      <div class="fp-stage" id="fp-stage">
        <div class="fp-track" id="fp-track"></div>
      </div>
      <div class="fp-info" id="fp-info"></div>
    </section>

    <!-- 브랜드 티저 -->
    <section class="section">
      <div class="container">
        <div class="brand-teaser">
          <span class="eyebrow">Brand Story</span>
          <h2 class="section-title" data-i18n="teaser.title"></h2>
          <p data-i18n="teaser.desc"></p>
          <a href="about.html" class="btn btn-ghost" style="background:#fff" data-i18n="teaser.cta"></a>
        </div>
      </div>
    </section>
  </main>

  <div id="chrome-footer"></div>

  <script src="js/i18n.js?v=47"></script>
  <script src="js/data.js?v=47"></script>
  <script src="js/main.js?v=47"></script>
  <script>
    // NEW / BEST 탭 섹션 : 각 4개씩 (제품 겹침 허용)
    let bestnewTab = "best";
    function renderBestNew(tab) {
      bestnewTab = tab;
      const grid = document.getElementById("bestnew-grid");
      const list =
        tab === "new"
          ? PRODUCTS.filter((p) => p.isNew).slice(0, 4)
          : [...PRODUCTS]
              .filter((p) => !p.comingSoon)
              .sort((a, b) => b.reviewCount - a.reviewCount)
              .slice(0, 4);
      // NEW 탭 카드는 신제품 쉐이드 이미지로 표시, 뱃지는 탭으로 구분되므로 숨김
      const NEW_CARD_IMGS = {
        "lip-balm": "assets/products/lip balm 02 cocoa drip.png",
        "lip-liner": "assets/products/lip liner 02 bare rose.png",
        "cream-blush": "assets/products/cream blush 04 warm nude.png",
        "powder-blush": "assets/products/powder blush 04 golden hour.png",
      };
      grid.innerHTML = list
        .map((p) =>
          productCardHTML(
            p, 0, false,
            tab === "new" ? NEW_CARD_IMGS[p.id] || null : null
          )
        )
        .join("");
      document.querySelectorAll(".sec-tab").forEach((b) =>
        b.classList.toggle("active", b.dataset.secTab === tab)
      );
      // 탭에 맞춰 좌측 비주얼 교체 (부드러운 크로스페이드)
      const visual = document.getElementById("bestnew-visual-img");
      const nextSrc = tab === "new" ? "assets/new product.jpg" : "assets/model best.jpg";
      if (visual.getAttribute("src") !== nextSrc) {
        visual.style.opacity = "0";
        const pre = new Image();
        pre.onload = () => {
          visual.src = nextSrc;
          requestAnimationFrame(() => (visual.style.opacity = ""));
        };
        pre.src = nextSrc;
      }
      visual.alt = tab === "new" ? "FLUSH 신제품 컷" : "FLUSH 모델 컷";
    }
    document.querySelector(".sec-tabs").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-sec-tab]");
      if (btn) renderBestNew(btn.dataset.secTab);
    });
    renderBestNew("best");

    // NEW/BEST 자동 전환 (마우스를 올려두면 정지)
    (() => {
      const box = document.querySelector(".bestnew-layout");
      let hover = false;
      box.addEventListener("mouseenter", () => (hover = true));
      box.addEventListener("mouseleave", () => (hover = false));
      setInterval(() => {
        if (!hover) renderBestNew(bestnewTab === "best" ? "new" : "best");
      }, 5000);
    })();

    // 왼쪽 비주얼: 원형 DRAG 커서가 부드럽게 따라오고, 드래그로 전환(왼→NEW, 오른→BEST)
    (() => {
      const visual = document.querySelector(".bestnew-visual");
      const img = document.getElementById("bestnew-visual-img");
      const cue = visual.querySelector(".drag-cue");
      img.draggable = false;

      // 커서 위치는 viewport 좌표(lx,ly)로 저장하고, 매 프레임 이미지 기준으로 환산 →
      // 스크롤로 이미지가 움직여도 버블이 실제 커서에서 밀리지 않음
      let lx = 0, ly = 0, cx = 0, cy = 0;   // 포인터 viewport / 버블 현재(이미지 기준)
      let tShift = 0, cShift = 0;           // 이미지 이동 목표/현재
      let raf = null, inside = false;
      function placeCue() {
        cue.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
      }
      function frame() {
        const r = visual.getBoundingClientRect();
        const tx = lx - r.left, ty = ly - r.top; // viewport → 이미지 기준(매 프레임 재계산)
        cx += (tx - cx) * 0.3;
        cy += (ty - cy) * 0.3;
        placeCue();
        cShift += (tShift - cShift) * 0.16;  // 손끝을 부드럽게 따라오는 이미지
        if (Math.abs(cShift) > 0.05 || tShift) img.style.transform = `scale(1.15) translateX(${cShift.toFixed(2)}px)`;
        else img.style.transform = "";
        if (inside || Math.abs(cShift - tShift) > 0.3 || Math.abs(cShift) > 0.3) {
          raf = requestAnimationFrame(frame);
        } else raf = null;
      }
      const kick = () => { if (!raf) raf = requestAnimationFrame(frame); };

      visual.addEventListener("pointerenter", (e) => {
        lx = e.clientX; ly = e.clientY;
        const r = visual.getBoundingClientRect();
        cx = lx - r.left; cy = ly - r.top; // 진입 시 즉시 위치(점프 방지)
        placeCue();
        inside = true;
        kick();
      });
      visual.addEventListener("pointerleave", () => (inside = false));

      // 스크롤 중엔 rAF 보간을 기다리지 않고 즉시 재배치 → 끊김/밀림 방지
      window.addEventListener("scroll", () => {
        if (!inside) return;
        const r = visual.getBoundingClientRect();
        cx = lx - r.left; cy = ly - r.top;
        placeCue();
      }, { passive: true });

      // 드래그 전환 (왼→NEW, 오른→BEST) — tShift 목표만 갱신, 실제 이동은 rAF가 보간
      let startX = null;
      const endDrag = () => {
        startX = null;
        visual.classList.remove("dragging");
        tShift = 0; // 부드럽게 제자리로
        kick();
      };
      visual.addEventListener("pointerdown", (e) => {
        startX = e.clientX;
        visual.setPointerCapture(e.pointerId);
        visual.classList.add("dragging");
      });
      visual.addEventListener("pointermove", (e) => {
        lx = e.clientX; ly = e.clientY;
        kick();
        if (startX === null) return;
        const dx = e.clientX - startX;
        tShift = Math.max(-26, Math.min(26, dx * 0.24));
        if (dx <= -46) { renderBestNew("new"); endDrag(); }
        else if (dx >= 46) { renderBestNew("best"); endDrag(); }
      });
      visual.addEventListener("pointerup", endDrag);
      visual.addEventListener("pointercancel", endDrag);
    })();

    // Choose your Flush — 드래그 캐러셀 : 드래그로 하나씩 이동, 배경=현재 쉐이드, 텍스트 항상 표시
    (() => {
      // 제품이 골고루 섞이도록 라운드로빈으로 뽑기 (쉐이드 순서는 랜덤)
      const pools = PRODUCTS.filter((p) => !p.comingSoon).map((p) => ({
        p,
        shades: p.shades.filter((s) => s.img).sort(() => Math.random() - 0.5),
      }));
      const ITEMS = [];
      while (pools.some((q) => q.shades.length)) {
        pools.forEach((q) => {
          if (q.shades.length) ITEMS.push({ p: q.p, s: q.shades.pop() });
        });
      }
      const BASE = ITEMS;
      const N = BASE.length;
      const section = document.getElementById("flush-picker");
      const stage = document.getElementById("fp-stage");
      const track = document.getElementById("fp-track");
      const info = document.getElementById("fp-info");
      let drag = 0;

      // 무한 순환 : 3벌 렌더 후 가운데 벌에서 시작, 끝에 닿으면 순간 보정
      const ALL = [];
      for (let r = 0; r < 3; r++) BASE.forEach((it) => ALL.push(it));
      track.innerHTML = ALL.map(
        (it, i) => `<div class="fp-item" data-i="${i}"><img src="${it.s.img}" alt="${pName(it.p)} ${it.s.name}" draggable="false" loading="lazy"></div>`
      ).join("");

      let idx = N + Math.floor(N / 2);
      const itemW = () => track.children[0].getBoundingClientRect().width;

      function place(instant) {
        track.style.transition = instant ? "none" : "";
        const x = (stage.getBoundingClientRect().width - itemW()) / 2 - idx * itemW() + drag; // 현재 아이템 정중앙
        track.style.transform = `translateX(${x}px)`;
      }
      function paint() {
        [...track.children].forEach((el, i) => el.classList.toggle("active", i === idx));
        const it = BASE[((idx % N) + N) % N];
        const bg = it.s.bg || it.s.hex; // 쉐이드 이미지에서 추출한 색 우선
        section.classList.add("tinted");
        section.style.background = bg;
        // 밝은 배경(파스텔)에서는 어두운 글자로 전환 — 상대 휘도 기준
        const [r, g, b] = [1, 3, 5].map((o) => parseInt(bg.slice(o, o + 2), 16));
        section.classList.toggle("bright", 0.2126 * r + 0.7152 * g + 0.0722 * b > 165);
        info.innerHTML = `
          <p class="fp-product">${pName(it.p)}</p>
          <p class="fp-shade">${it.s.name}</p>
          <p class="fp-cat">${it.p.catLabel}</p>
          <a class="fp-more" href="product.html?id=${it.p.id}&shade=${encodeURIComponent(it.s.name)}">VIEW MORE</a>`;
      }
      function go(instant) { place(instant); paint(); }

      // 스냅 애니메이션이 끝나면 가운데 벌로 순간 이동 → 무한 순환
      track.addEventListener("transitionend", () => {
        if (idx < N) { idx += N; place(true); }
        else if (idx >= 2 * N) { idx -= N; place(true); }
      });

      // 드래그로 한 번에 하나씩 이동 (아이템 탭 시 해당 항목으로)
      let startX = null;
      stage.addEventListener("pointerdown", (e) => {
        startX = e.clientX;
        stage.setPointerCapture(e.pointerId);
        stage.classList.add("dragging");
      });
      stage.addEventListener("pointermove", (e) => {
        if (startX === null) return;
        drag = e.clientX - startX;
        place(true);
      });
      const end = (e) => {
        if (startX === null) return;
        const tapped = Math.abs(drag) < 6 && e.target.closest(".fp-item");
        const dir = drag <= -40 ? 1 : drag >= 40 ? -1 : 0;
        idx = tapped ? +tapped.dataset.i : idx + dir;
        drag = 0;
        startX = null;
        stage.classList.remove("dragging");
        go(false);
      };
      stage.addEventListener("pointerup", end);
      stage.addEventListener("pointercancel", end);
      window.addEventListener("resize", () => place(true));

      // 자동 전환 : 2초마다 다음 아이템 (드래그 중이거나 마우스 올리면 정지)
      let hover = false;
      stage.addEventListener("mouseenter", () => (hover = true));
      stage.addEventListener("mouseleave", () => (hover = false));
      setInterval(() => {
        if (startX !== null || hover) return;
        idx += 1;
        go(false);
      }, 2000);

      go(true);
    })();

    // 프로모션 팝업 — 오늘 하루 보지 않기(로컬 저장)
    (() => {
      const modal = document.getElementById("ad-modal");
      if (!modal) return;
      const KEY = "flush-ad-hide";
      const today = new Date().toISOString().slice(0, 10);
      try { if (localStorage.getItem(KEY) === today) return; } catch (e) {}
      modal.hidden = false;
      const close = () => (modal.hidden = true);
      document.getElementById("ad-close").addEventListener("click", close);
      document.getElementById("ad-dim").addEventListener("click", close);
      document.getElementById("ad-link").addEventListener("click", close);
      document.getElementById("ad-today").addEventListener("click", () => {
        try { localStorage.setItem(KEY, today); } catch (e) {}
        close();
      });
    })();

    // 히어로 슬라이더 — 항상 오른쪽으로 무한 순환(마지막 → 첫 이미지를 이어서, 되감기 없음)
    (() => {
      const banner = document.querySelector(".main-banner");
      const track = document.getElementById("banner-track");
      const nav = document.getElementById("banner-nav");
      const slides = [...track.children].filter((el) => !el.classList.contains("s-ph"));
      const N = slides.length;

      nav.innerHTML = slides
        .map((_, i) => `<button class="banner-dot ${i === 0 ? "active" : ""}" data-slot="${i}" aria-label="banner ${i + 1}"></button>`)
        .join("");

      if (N <= 1) {
        banner.style.height = (track.children[0] ? track.children[0].offsetHeight : 0) + "px";
        return;
      }

      // 첫 슬라이드 복제본을 끝에 붙여, 마지막에서 첫 이미지로 '오른쪽으로' 이어지게
      const clone = slides[0].cloneNode(true);
      clone.setAttribute("aria-hidden", "true");
      track.appendChild(clone);

      let idx = 0;
      function fitBanner() { banner.style.height = track.children[idx].offsetHeight + "px"; }
      function setDots() {
        nav.querySelectorAll(".banner-dot").forEach((d, i) => d.classList.toggle("active", i === idx % N));
      }
      function go(n, animate = true) {
        idx = n;
        track.style.transition = animate ? "" : "none";
        track.style.transform = `translateX(-${idx * 100}%)`;
        setDots();
        fitBanner();
      }
      // 복제본(마지막)에 도달하면 애니메이션 없이 실제 첫 슬라이드로 순간 이동 → 끊김 없는 정방향 루프
      track.addEventListener("transitionend", () => { if (idx === N) go(0, false); });

      nav.addEventListener("click", (e) => {
        const dot = e.target.closest("[data-slot]");
        if (dot) go(+dot.dataset.slot);
      });
      window.addEventListener("resize", fitBanner);
      fitBanner();

      let hover = false;
      banner.addEventListener("mouseenter", () => (hover = true));
      banner.addEventListener("mouseleave", () => (hover = false));
      setInterval(() => { if (!hover && idx < N) go(idx + 1); }, 10000);
    })();
  </script>
</body>
</html>
