<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문/결제 — FLUSH</title>
  <meta name="description" content="FLUSH 주문/결제">
  <link rel="icon" href="assets/flush_icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=47">
</head>
<body>

  <div id="chrome-header"></div>

  <main>
    <div class="container">
      <div class="page-head">
        <h1 data-i18n="co.title"></h1>
      </div>

      <div class="cart-layout" id="checkout-layout">
        <section>
          <div class="checkout-block">
            <h3><span data-i18n="co.items"></span> <span id="checkout-item-count"></span></h3>
            <div class="checkout-items" id="checkout-items"></div>
          </div>

          <div class="checkout-block">
            <h3 data-i18n="co.shipTitle"></h3>
            <form class="checkout-form" id="ship-form">
              <label class="auth-field">
                <span data-i18n="co.recipient"></span>
                <input type="text" id="ship-name" data-i18n-ph="co.recipientPh" required>
              </label>
              <label class="auth-field">
                <span data-i18n="co.phone"></span>
                <input type="tel" id="ship-phone" data-i18n-ph="co.phonePh" required>
              </label>
              <label class="auth-field">
                <span data-i18n="co.address"></span>
                <input type="text" id="ship-address" data-i18n-ph="co.addressPh" required>
              </label>
              <label class="auth-field">
                <span data-i18n="co.request"></span>
                <input type="text" id="ship-request" data-i18n-ph="co.requestPh">
              </label>
            </form>
          </div>

          <div class="checkout-block">
            <h3 data-i18n="co.payTitle"></h3>
            <div class="pay-methods" id="pay-methods">
              <label class="pay-method">
                <input type="radio" name="pay" value="card" checked>
                <span data-i18n="co.payCard"></span>
              </label>
              <label class="pay-method">
                <input type="radio" name="pay" value="kakao">
                <span data-i18n="co.payKakao"></span>
              </label>
              <label class="pay-method">
                <input type="radio" name="pay" value="bank">
                <span data-i18n="co.payBank"></span>
              </label>
            </div>
          </div>
        </section>

        <aside class="cart-summary">
          <h3 data-i18n="co.summary"></h3>
          <div class="summary-row"><span data-i18n="cart.subtotal"></span><span id="co-subtotal"></span></div>
          <div class="summary-row"><span data-i18n="cart.shippingFee"></span><span id="co-shipping"></span></div>
          <div class="summary-row"><span data-i18n="cart.point"></span><span id="co-point" class="free"></span></div>
          <div class="summary-row total"><span data-i18n="cart.total"></span><span id="co-total"></span></div>
          <button class="btn btn-primary" id="checkout-submit" data-i18n="co.submit"></button>
        </aside>
      </div>

      <div class="cart-empty" id="checkout-done" hidden>
        <span class="ce-emoji">🎉</span>
        <h2 data-i18n="co.done.title"></h2>
        <p data-i18n="co.done.desc"></p>
        <p><span data-i18n="co.done.orderNo"></span> <b id="order-no"></b></p>
        <a href="shop.html" class="btn btn-primary" data-i18n="co.done.cta"></a>
      </div>
    </div>
  </main>

  <div id="chrome-footer"></div>

  <script src="js/i18n.js?v=47"></script>
  <script src="js/data.js?v=47"></script>
  <script src="js/main.js?v=47"></script>
  <script src="js/checkout.js?v=47"></script>
</body>
</html>
