<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — FLUSH</title>
  <meta name="description" content="FLUSH 회원 로그인">
  <link rel="icon" href="assets/flush_icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=47">
</head>
<body>

  <div id="chrome-header"></div>

  <main>
    <div class="container">
      <div class="page-head">
        <h1 data-i18n="login.title"></h1>
      </div>

      <form class="auth-card" id="login-form" novalidate>
        <label class="auth-field">
          <span data-i18n="login.email"></span>
          <input type="email" name="email" data-i18n-ph="login.emailPh" required>
        </label>
        <label class="auth-field">
          <span data-i18n="login.pw"></span>
          <input type="password" name="password" data-i18n-ph="login.pwPh" required>
        </label>

        <div class="auth-row">
          <label class="auth-keep">
            <input type="checkbox" name="keep">
            <span data-i18n="login.keep"></span>
          </label>
          <span class="auth-links">
            <a href="javascript:void(0)" data-i18n="login.findId"></a>
            <i>|</i>
            <a href="javascript:void(0)" data-i18n="login.findPw"></a>
          </span>
        </div>

        <button type="submit" class="btn btn-primary auth-submit" data-i18n="login.submit"></button>

        <div class="auth-divider"><span data-i18n="login.divider"></span></div>

        <button type="button" class="btn auth-kakao" id="kakao-login">
          <svg class="kakao-logo" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10 2.4C5.34 2.4 1.56 5.34 1.56 8.96c0 2.32 1.55 4.36 3.88 5.53-.17.62-.62 2.23-.71 2.58-.11.42.16.42.33.3.13-.09 2.13-1.45 3-2.04.63.09 1.28.14 1.94.14 4.66 0 8.44-2.94 8.44-6.51S14.66 2.4 10 2.4z" fill="currentColor"/>
          </svg>
          <span data-i18n="login.kakao"></span>
        </button>

        <p class="auth-signup">
          <span data-i18n="login.noAccount"></span>
          <a href="javascript:void(0)" data-i18n="top.join"></a>
        </p>
      </form>
    </div>
  </main>

  <div id="chrome-footer"></div>

  <script src="js/i18n.js?v=47"></script>
  <script src="js/data.js?v=47"></script>
  <script src="js/main.js?v=47"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      showToast(t("toast.login"));
    });
    document.getElementById("kakao-login").addEventListener("click", () => {
      showToast(t("toast.login"));
    });
  </script>
</body>
</html>
