<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Story — FLUSH</title>
  <meta name="description" content="입술과 볼에 자연스럽게 올라오는 생기를 제안하는 LIP &amp; CHEEK 컬러 브랜드, FLUSH의 이야기.">
  <link rel="icon" href="assets/flush_icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="chrome-header"></div>

  <main>
    <div class="container">
      <!-- Brand Concept -->
      <section class="about-hero">
        <span class="eyebrow">Brand Story</span>
        <h1 data-i18n="ab.hero.title"></h1>
        <p data-i18n="ab.hero.desc"></p>

        <div class="keyword-cloud" id="keywords">
          <span class="keyword-chip">Transparent</span>
          <span class="keyword-chip">Soft</span>
          <span class="keyword-chip">Fresh</span>
          <span class="keyword-chip">Glossy</span>
          <span class="keyword-chip">Playful</span>
          <span class="keyword-chip">Touchable</span>
          <span class="keyword-chip">Colorful</span>
          <span class="keyword-chip">Easy</span>
        </div>
      </section>

      <!-- Story 1 : 패키징에서 시작된 호기심 -->
      <section class="section">
        <div class="story-grid">
          <div class="story-img">
            <span class="img-ph" role="img" aria-label="brand story visual 1"></span>
          </div>
          <div class="story-text">
            <h2 data-i18n="ab.s1.title"></h2>
            <p data-i18n="ab.s1.p1"></p>
            <p data-i18n="ab.s1.p2"></p>
          </div>
        </div>
      </section>

      <!-- Story 2 : 발색에 대한 기대감 -->
      <section class="section">
        <div class="story-grid reverse">
          <div class="story-img">
            <span class="img-ph" role="img" aria-label="brand story visual 2"></span>
          </div>
          <div class="story-text">
            <h2 data-i18n="ab.s2.title"></h2>
            <p data-i18n="ab.s2.p1"></p>
            <p data-i18n="ab.s2.p2"></p>
          </div>
        </div>
      </section>

      <!-- Positioning : LIP & CHEEK -->
      <section class="section">
        <div class="section-head">
          <span class="eyebrow">Positioning</span>
          <h2 class="section-title" data-i18n="ab.pos.title"></h2>
          <p class="section-sub" data-i18n="ab.pos.sub"></p>
        </div>
        <div class="positioning-cards">
          <div class="pos-card lip">
            <h3>LIP</h3>
            <p data-i18n="ab.pos.lip.desc"></p>
            <ul>
              <li>Lip Tint <span data-i18n="ab.pos.lip.tint"></span></li>
              <li>Lip Balm <span data-i18n="ab.pos.lip.balm"></span></li>
              <li>Lip Liner <span data-i18n="ab.pos.lip.liner"></span></li>
            </ul>
          </div>
          <div class="pos-card cheek">
            <h3>CHEEK</h3>
            <p data-i18n="ab.pos.cheek.desc"></p>
            <ul>
              <li>Cream Blush <span data-i18n="ab.pos.cheek.cream"></span></li>
              <li>Powder Blush <span data-i18n="ab.pos.cheek.powder"></span></li>
              <li>Cheek Tint <span data-i18n="ab.pos.cheek.tint"></span></li>
            </ul>
          </div>
        </div>
      </section>

      <!-- CTA -->
      <section class="section about-cta">
        <div class="brand-teaser">
          <span class="eyebrow">Find Your Color</span>
          <h2 class="section-title" data-i18n="ab.cta.title"></h2>
          <p data-i18n="ab.cta.desc"></p>
          <a href="shop.html" class="btn btn-primary" data-i18n="ab.cta.btn"></a>
        </div>
      </section>
    </div>
  </main>

  <div id="chrome-footer"></div>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
