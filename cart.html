<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — FLUSH</title>
  <meta name="description" content="FLUSH 장바구니">
  <link rel="icon" href="assets/flush_icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="chrome-header"></div>

  <main>
    <div class="container">
      <div class="page-head">
        <h1 data-i18n="cart.title"></h1>
        <p data-i18n="cart.sub"></p>
      </div>

      <!-- 비어있을 때 -->
      <div class="cart-empty" id="cart-empty" hidden>
        <span class="ce-emoji">🛍️</span>
        <h2 data-i18n="cart.empty.title"></h2>
        <p data-i18n="cart.empty.desc"></p>
        <a href="shop.html" class="btn btn-primary" data-i18n="cart.empty.cta"></a>
      </div>

      <!-- 담긴 상품이 있을 때 -->
      <div class="cart-layout" id="cart-layout">
        <section>
          <div class="ship-progress" id="ship-progress">
            <p id="ship-progress-text"></p>
            <div class="ship-bar"><i id="ship-bar-fill" style="width:0%"></i></div>
          </div>
          <div class="cart-items" id="cart-items"></div>
        </section>

        <aside class="cart-summary">
          <h3 data-i18n="cart.summary"></h3>
          <div class="summary-row"><span data-i18n="cart.subtotal"></span><span id="sum-subtotal"></span></div>
          <div class="summary-row"><span data-i18n="cart.shippingFee"></span><span id="sum-shipping"></span></div>
          <div class="summary-row"><span data-i18n="cart.point"></span><span id="sum-point" class="free"></span></div>
          <div class="summary-row total"><span data-i18n="cart.total"></span><span id="sum-total"></span></div>
          <button class="btn btn-primary" id="checkout-btn" data-i18n="cart.checkout"></button>
        </aside>
      </div>

      <!-- 같이 쓰면 좋은 조합 -->
      <section class="cart-pairing" id="cart-pairing">
        <div class="section-head">
          <span class="eyebrow">Better Together</span>
          <h2 class="section-title" data-i18n="cart.together.title"></h2>
        </div>
        <div class="pair-grid" id="cart-set-grid"></div>
      </section>
    </div>
  </main>

  <div id="chrome-footer"></div>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
